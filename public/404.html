<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Resen Legal & Consultancy</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dlrsifk2y/image/upload/v1783085001/favicon_Small_ym0qqz.png" />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: #0b0f19;
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }
      .container {
        max-width: 600px;

      h1 {
        font-size: 72px;
        font-weight: 300;
        color: #c5a880;
        margin: 0 0 10px 0;

      }
      h2 {
        font-size: 24px;
        font-weight: 400;
        color: #f1f5f9;
        margin: 0 0 20px 0;
        letter-spacing: -0.5px;
      }
      p {
        font-size: 16px;
        color: #94a3b8;
        line-height: 1.6;
        margin-bottom: 40px;
      }
      .btn {
        display: inline-block;
        background-color: #c5a880;
        color: #0b0f19;
        text-decoration: none;
        padding: 14px 28px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 2px;
        transition: background-color 0.2s ease;
      }
      .btn:hover {
